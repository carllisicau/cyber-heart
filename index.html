<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cyber Love - 科技感爱心</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0f;
      font-family: 'Orbitron', sans-serif;
      touch-action: manipulation;
    }

    /* 动态背景网格 */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 105, 180, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 105, 180, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    /* 背景光晕 */
    .glow-bg {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.2) 0%, rgba(138, 43, 226, 0.1) 50%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
    }

    /* 爱心容器 */
    .cyber-heart {
      position: relative;
      width: 65px;
      height: 65px;
      flex-shrink: 0;
    }

    /* 跳动动画 */
    .heart-beat {
      width: 100%;
      height: 100%;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    .heart-beat:nth-child(1) { animation-delay: 0s; }
    .heart-beat:nth-child(2) { animation-delay: 0.2s; }
    .heart-beat:nth-child(3) { animation-delay: 0.4s; }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.1); }
      30% { transform: scale(1); }
      50% { transform: scale(1.06); }
      70% { transform: scale(1); }
    }

    /* 霓虹爱心 */
    .neon-heart {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      filter: drop-shadow(0 0 12px rgba(255, 105, 180, 0.8));
    }

    /* 外层霓虹轮廓 */
    .neon-heart::before {
      content: '❤';
      position: absolute;
      font-size: 60px;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(255, 105, 180, 0.7);
    }

    /* 内层渐变填充 */
    .neon-heart::after {
      content: '❤';
      position: absolute;
      font-size: 52px;
      background: linear-gradient(135deg, #ff69b4, #da70d6, #8a2be2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* 字母 */
    .letter {
      position: absolute;
      z-index: 20;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 10px #ff69b4, 0 0 20px #da70d6;
      letter-spacing: 2px;
    }

    /* 静态光点 */
    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #ffb6c1;
      border-radius: 50%;
      box-shadow: 0 0 6px #ff69b4;
    }

    .sparkle:nth-of-type(1) { top: 8px; left: 15%; }
    .sparkle:nth-of-type(2) { top: 12px; right: 18%; }
    .sparkle:nth-of-type(3) { bottom: 18px; left: 25%; }

    /* 点击波纹效果 */
    .click-ripple {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 105, 180, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      animation: ripple 1s ease-out forwards;
    }

    @keyframes ripple {
      0% {
        width: 20px;
        height: 20px;
        opacity: 1;
        border-width: 2px;
      }
      100% {
        width: 200px;
        height: 200px;
        opacity: 0;
        border-width: 0px;
      }
    }

    /* 响应式 */
    @media (max-width: 380px) {
      .container {
        gap: 8px;
      }
      .cyber-heart {
        width: 55px;
        height: 55px;
      }
      .neon-heart::before {
        font-size: 50px;
      }
      .neon-heart::after {
        font-size: 44px;
      }
      .letter {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-bg"></div>

  <div class="container">
    <!-- 爱心 1: s -->
    <div class="cyber-heart">
      <div class="heart-beat">
        <div class="neon-heart">
          <span class="letter">s</span>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
        </div>
      </div>
    </div>

    <!-- 爱心 2: h -->
    <div class="cyber-heart">
      <div class="heart-beat">
        <div class="neon-heart">
          <span class="letter">h</span>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
        </div>
      </div>
    </div>

    <!-- 爱心 3: l -->
    <div class="cyber-heart">
      <div class="heart-beat">
        <div class="neon-heart">
          <span class="letter">l</span>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 点击/触摸波纹效果
    function createRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 1000);
    }

    document.addEventListener('click', (e) => {
      createRipple(e.clientX, e.clientY);
    });

    document.addEventListener('touchend', (e) => {
      if (e.target === document.body || e.target.closest('.container')) {
        const touch = e.changedTouches[0];
        createRipple(touch.clientX, touch.clientY);
      }
    }, { passive: true });
  </script>
</body>
</html>
