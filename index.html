<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Love - 科技感爱心</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0f;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      cursor: pointer;
    }

    /* 动态背景网格 */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(138, 43, 226, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138, 43, 226, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    /* 背景光晕 */
    .glow-bg {
      position: fixed;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(138, 43, 226, 0.15) 0%, transparent 60%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
    }

    .container {
      display: flex;
      gap: 20px;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    /* 科技感爱心容器 */
    .cyber-heart {
      position: relative;
      width: 90px;
      height: 90px;
      animation: heartbeat 1.5s ease-in-out infinite;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .cyber-heart:hover {
      transform: scale(1.15) rotate(5deg);
    }

    .cyber-heart:nth-child(1) { animation-delay: 0s; }
    .cyber-heart:nth-child(2) { animation-delay: 0.15s; }
    .cyber-heart:nth-child(3) { animation-delay: 0.3s; }

    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.8));
      }
      15% {
        transform: scale(1.12);
        filter: drop-shadow(0 0 30px rgba(138, 43, 226, 1));
      }
      30% {
        transform: scale(1);
        filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.8));
      }
      45% {
        transform: scale(1.08);
      }
      60% {
        transform: scale(1);
      }
    }

    /* 霓虹爱心形状 */
    .neon-heart {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 外层霓虹轮廓 */
    .neon-heart::before {
      content: '❤';
      position: absolute;
      font-size: 85px;
      color: transparent;
      -webkit-text-stroke: 2px rgba(138, 43, 226, 0.6);
      text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
      animation: neonFlicker 2s ease-in-out infinite;
    }

    @keyframes neonFlicker {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* 内层填充 */
    .neon-heart::after {
      content: '❤';
      position: absolute;
      font-size: 75px;
      background: linear-gradient(135deg, #8a2be2, #9400d3, #4b0082);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.9));
    }

    /* 字母 */
    .letter {
      position: absolute;
      z-index: 20;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      text-shadow:
        0 0 10px #8a2be2,
        0 0 20px #8a2be2,
        0 0 40px #9400d3;
      letter-spacing: 4px;
      animation: letterGlow 1.5s ease-in-out infinite;
    }

    .cyber-heart:nth-child(1) .letter { animation-delay: 0s; }
    .cyber-heart:nth-child(2) .letter { animation-delay: 0.15s; }
    .cyber-heart:nth-child(3) .letter { animation-delay: 0.3s; }

    @keyframes letterGlow {
      0%, 100% {
        text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 40px #9400d3;
      }
      50% {
        text-shadow: 0 0 20px #ba55d3, 0 0 40px #ba55d3, 0 0 60px #da70d6;
      }
    }

    /* 粒子效果 */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #da70d6;
      border-radius: 50%;
      box-shadow: 0 0 10px #da70d6, 0 0 20px #8a2be2;
      animation: particleFly 2s ease-out infinite;
    }

    .particle:nth-of-type(1) { top: 10%; left: 20%; animation-delay: 0s; }
    .particle:nth-of-type(2) { top: 15%; right: 15%; animation-delay: 0.4s; }
    .particle:nth-of-type(3) { bottom: 20%; left: 30%; animation-delay: 0.8s; }
    .particle:nth-of-type(4) { bottom: 25%; right: 25%; animation-delay: 1.2s; }

    @keyframes particleFly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(30px, -30px) scale(0);
      }
    }

    /* 环绕光环 */
    .ring {
      position: absolute;
      inset: -15px;
      border: 1px solid rgba(138, 43, 226, 0.3);
      border-radius: 50%;
      animation: ringRotate 4s linear infinite;
    }

    .ring::before {
      content: '';
      position: absolute;
      top: -2px;
      left: 50%;
      width: 4px;
      height: 4px;
      background: #da70d6;
      border-radius: 50%;
      box-shadow: 0 0 10px #da70d6;
    }

    @keyframes ringRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .ring:nth-child(2) {
      inset: -25px;
      animation-duration: 6s;
      animation-direction: reverse;
    }

    /* 点击波纹效果 */
    .click-ripple {
      position: fixed;
      width: 10px;
      height: 10px;
      border: 2px solid #8a2be2;
      border-radius: 50%;
      pointer-events: none;
      animation: ripple 1s ease-out forwards;
    }

    @keyframes ripple {
      0% {
        width: 10px;
        height: 10px;
        opacity: 1;
      }
      100% {
        width: 300px;
        height: 300px;
        opacity: 0;
      }
    }

    /* 提示文字 */
    .hint {
      position: fixed;
      bottom: 30px;
      color: rgba(138, 43, 226, 0.5);
      font-size: 12px;
      letter-spacing: 3px;
      animation: hintPulse 2s ease-in-out infinite;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-bg"></div>

  <div class="container">
    <!-- 爱心 1: s -->
    <div class="cyber-heart">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="neon-heart"></div>
      <span class="letter">s</span>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <!-- 爱心 2: h -->
    <div class="cyber-heart">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="neon-heart"></div>
      <span class="letter">h</span>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <!-- 爱心 3: l -->
    <div class="cyber-heart">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="neon-heart"></div>
      <span class="letter">l</span>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
  </div>

  <div class="hint">CLICK ANYWHERE</div>

  <script>
    // 点击产生波纹效果
    document.addEventListener('click', (e) => {
      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.left = e.clientX - 5 + 'px';
      ripple.style.top = e.clientY - 5 + 'px';
      document.body.appendChild(ripple);

      setTimeout(() => ripple.remove(), 1000);
    });

    // 鼠标移动产生粒子跟随
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
  </script>
</body>
</html>
