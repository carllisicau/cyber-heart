<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>for shl</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0f;
      font-family: 'Orbitron', sans-serif;
      touch-action: manipulation;
    }

    /* 动态背景网格 */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 105, 180, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 105, 180, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    /* 背景光晕 */
    .glow-bg {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.2) 0%, rgba(138, 43, 226, 0.1) 50%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      display: flex;
      gap: 25px;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
    }

    /* 爱心外框容器 */
    .cyber-frame {
      position: relative;
      width: 70px;
      height: 70px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 外圈粒子环绕 */
    .particles {
      position: absolute;
      inset: -15px;
      animation: rotate 8s linear infinite;
      pointer-events: none;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 外圈粒子 */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ff69b4;
      border-radius: 50%;
      box-shadow: 0 0 8px #ff69b4, 0 0 15px #da70d6;
    }

    .particle:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
    .particle:nth-child(2) { top: 15%; right: 5%; }
    .particle:nth-child(3) { bottom: 15%; right: 5%; }
    .particle:nth-child(4) { bottom: 0; left: 50%; transform: translateX(-50%); }
    .particle:nth-child(5) { bottom: 15%; left: 5%; }
    .particle:nth-child(6) { top: 15%; left: 5%; }

    /* 内圈粒子 */
    .particles-inner {
      position: absolute;
      inset: -8px;
      animation: rotateReverse 5s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateReverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    .particle-inner {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #ffb6c1;
      border-radius: 50%;
      box-shadow: 0 0 5px #ffb6c1;
    }

    .particle-inner:nth-child(1) { top: 10%; left: 30%; }
    .particle-inner:nth-child(2) { top: 50%; right: 0; }
    .particle-inner:nth-child(3) { bottom: 10%; left: 30%; }
    .particle-inner:nth-child(4) { top: 50%; left: 0; }

    /* 爱心跳动 */
    .heart-wrapper {
      animation: heartbeat 1.5s ease-in-out infinite;
      z-index: 5;
    }

    .heart-wrapper:nth-child(2) { animation-delay: 0s; }
    .heart-wrapper:nth-child(3) { animation-delay: 0.2s; }
    .heart-wrapper:nth-child(4) { animation-delay: 0.4s; }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.1); }
      30% { transform: scale(1); }
      50% { transform: scale(1.06); }
      70% { transform: scale(1); }
    }

    /* 霓虹爱心 */
    .neon-heart {
      position: relative;
      width: 55px;
      height: 55px;
      display: flex;
      justify-content: center;
      align-items: center;
      filter: drop-shadow(0 0 12px rgba(255, 105, 180, 0.8));
    }

    .neon-heart::before {
      content: '❤';
      position: absolute;
      font-size: 52px;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(255, 105, 180, 0.7);
    }

    .neon-heart::after {
      content: '❤';
      position: absolute;
      font-size: 45px;
      background: linear-gradient(135deg, #ff69b4, #da70d6, #8a2be2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* 字母 */
    .letter {
      position: absolute;
      z-index: 20;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 10px #ff69b4, 0 0 20px #da70d6;
      letter-spacing: 2px;
    }

    /* 点击波纹效果 */
    .click-ripple {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 105, 180, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      animation: ripple 1s ease-out forwards;
    }

    @keyframes ripple {
      0% {
        width: 20px;
        height: 20px;
        opacity: 1;
        border-width: 2px;
      }
      100% {
        width: 200px;
        height: 200px;
        opacity: 0;
        border-width: 0px;
      }
    }

    /* 响应式 */
    @media (max-width: 380px) {
      .container {
        gap: 18px;
      }
      .cyber-frame {
        width: 55px;
        height: 55px;
      }
      .neon-heart::before {
        font-size: 42px;
      }
      .neon-heart::after {
        font-size: 36px;
      }
      .letter {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-bg"></div>

  <div class="container">
    <!-- 爱心 1: s -->
    <div class="cyber-frame">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
      <div class="particles-inner">
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
      </div>
      <div class="heart-wrapper">
        <div class="neon-heart">
          <span class="letter">s</span>
        </div>
      </div>
    </div>

    <!-- 爱心 2: h -->
    <div class="cyber-frame">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
      <div class="particles-inner">
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
      </div>
      <div class="heart-wrapper">
        <div class="neon-heart">
          <span class="letter">h</span>
        </div>
      </div>
    </div>

    <!-- 爱心 3: l -->
    <div class="cyber-frame">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
      <div class="particles-inner">
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
        <div class="particle-inner"></div>
      </div>
      <div class="heart-wrapper">
        <div class="neon-heart">
          <span class="letter">l</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function createRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 1000);
    }

    document.addEventListener('click', (e) => {
      createRipple(e.clientX, e.clientY);
    });

    document.addEventListener('touchend', (e) => {
      if (e.target === document.body || e.target.closest('.container')) {
        const touch = e.changedTouches[0];
        createRipple(touch.clientX, touch.clientY);
      }
    }, { passive: true });
  </script>
</body>
</html>
